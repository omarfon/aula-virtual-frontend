<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-gray-900">Configuración de Empresa</h1>
    <p class="text-gray-600 mt-1">Personaliza la información y apariencia del sistema</p>
  </div>

  <!-- Spinner de carga -->
  <div *ngIf="cargando" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
    <p class="mt-4 text-gray-600">Cargando configuración...</p>
  </div>

  <form *ngIf="!cargando" (ngSubmit)="guardarConfiguracion()" class="space-y-6">
    <!-- Información Básica -->
    <div class="bg-white rounded-lg shadow-sm p-6">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Información Básica</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">Nombre de la Empresa</label>
          <input [(ngModel)]="configuracion.nombreEmpresa"
                 name="nombreEmpresa"
                 required
                 type="text"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input [(ngModel)]="configuracion.email"
                 name="email"
                 required
                 type="email"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Teléfono</label>
          <input [(ngModel)]="configuracion.telefono"
                 name="telefono"
                 type="tel"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Dirección</label>
          <input [(ngModel)]="configuracion.direccion"
                 name="direccion"
                 type="text"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Sitio Web</label>
          <input [(ngModel)]="configuracion.sitioWeb"
                 name="sitioWeb"
                 type="url"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
          <textarea [(ngModel)]="configuracion.descripcion"
                    name="descripcion"
                    rows="3"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      </div>
    </div>

    <!-- Apariencia -->
    <div class="bg-white rounded-lg shadow-sm p-6">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Apariencia</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Logo de la Empresa</label>
          <div class="flex items-center space-x-4">
            <div class="w-24 h-24 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center overflow-hidden">
              <img *ngIf="configuracion.logoUrl" [src]="configuracion.logoUrl" alt="Logo" class="w-full h-full object-cover">
              <svg *ngIf="!configuracion.logoUrl" class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
            </div>
            <label class="cursor-pointer px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
              Subir Logo
              <input type="file" 
                     accept="image/*" 
                     (change)="onLogoChange($event)"
                     class="hidden">
            </label>
          </div>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Color Primario</label>
            <div class="flex items-center space-x-2">
              <input [(ngModel)]="configuracion.colorPrimario"
                     name="colorPrimario"
                     type="color"
                     class="h-10 w-20 border border-gray-300 rounded cursor-pointer">
              <input [(ngModel)]="configuracion.colorPrimario"
                     name="colorPrimarioText"
                     type="text"
                     class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Color Secundario</label>
            <div class="flex items-center space-x-2">
              <input [(ngModel)]="configuracion.colorSecundario"
                     name="colorSecundario"
                     type="color"
                     class="h-10 w-20 border border-gray-300 rounded cursor-pointer">
              <input [(ngModel)]="configuracion.colorSecundario"
                     name="colorSecundarioText"
                     type="text"
                     class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Políticas -->
    <div class="bg-white rounded-lg shadow-sm p-6">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Políticas y Términos</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Términos de Servicio</label>
          <textarea [(ngModel)]="configuracion.terminosServicio"
                    name="terminosServicio"
                    rows="5"
                    placeholder="Escribe los términos de servicio..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Política de Privacidad</label>
          <textarea [(ngModel)]="configuracion.politicaPrivacidad"
                    name="politicaPrivacidad"
                    rows="5"
                    placeholder="Escribe la política de privacidad..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      </div>
    </div>

    <!-- Botones -->
    <div class="flex justify-end space-x-3">
      <button type="button"
              class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
        Cancelar
      </button>
      <button type="submit"
              [disabled]="guardando"
              class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
        {{ guardando ? 'Guardando...' : 'Guardar Configuración' }}
      </button>
    </div>
  </form>
</div>
