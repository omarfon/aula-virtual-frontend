<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Mis Cursos</h1>
      <button class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
        + Nuevo Curso
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let curso of cursos" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
        <div class="h-32" [ngClass]="curso.color"></div>
        <div class="p-6">
          <h3 class="text-xl font-semibold text-gray-800 mb-2">{{ curso.nombre }}</h3>
          <p class="text-gray-600 text-sm mb-4">{{ curso.profesor }}</p>
          
          <div class="flex items-center justify-between mb-4">
            <span class="text-gray-500 text-sm">
              <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path>
              </svg>
              {{ curso.estudiantes }} estudiantes
            </span>
          </div>

          <div class="mb-2">
            <div class="flex justify-between text-sm text-gray-600 mb-1">
              <span>Progreso</span>
              <span>{{ curso.progreso }}%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div class="h-2 rounded-full" [ngClass]="curso.color" [style.width.%]="curso.progreso"></div>
            </div>
          </div>

          <button class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition">
            Ver Detalles
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
