<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Dashboard</h1>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div *ngFor="let stat of stats" class="bg-white rounded-lg shadow-md p-6 border-l-4" [ngClass]="stat.color">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-gray-600 text-sm mb-1">{{ stat.title }}</p>
            <p class="text-3xl font-bold text-gray-800">{{ stat.value }}</p>
          </div>
          <div class="text-4xl">{{ stat.icon }}</div>
        </div>
      </div>
    </div>

    <!-- Recent Activities -->
    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Actividad Reciente</h2>
      <div class="space-y-4">
        <div *ngFor="let activity of recentActivities" class="flex items-start space-x-4 p-4 hover:bg-gray-50 rounded-lg transition">
          <div class="w-2 h-2 bg-indigo-600 rounded-full mt-2"></div>
          <div class="flex-1">
            <p class="font-semibold text-gray-800">{{ activity.course }}</p>
            <p class="text-gray-600 text-sm">{{ activity.activity }}</p>
            <p class="text-gray-400 text-xs mt-1">{{ activity.time }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
